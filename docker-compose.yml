version: '3.8'

services:

  # ── Backend FastAPI ───────────────────────────────────────
  rag_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbva_rag_api
    ports:
      - "8000:8000"
    volumes:
      - ./data/raw:/app/data/raw
      - ./data/clean:/app/data/clean
      - ./data/faiss_index:/app/data/faiss_index
      - ./data/db:/app/data/db
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 25s
      retries: 3

  # ── Frontend Streamlit ────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbva_streamlit
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      rag_api:
        condition: service_healthy
    restart: unless-stopped
